name: Release

on:
  push:
    tags:
      - "v*"

env:
  VERSION: ${{ github.ref_name }}

jobs:
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform: darwin-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build embedded opsctl
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o ./internal/embedded/opsctl_bin ./cmd/opsctl/

      - name: Build desktop app
        run: wails build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -tags embed_opsctl

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            tar -czf ops-cat-${{ matrix.platform }}.tar.gz -C build/bin ops-cat.app
          else
            tar -czf ops-cat-${{ matrix.platform }}.tar.gz -C build/bin ops-cat
          fi

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/ops-cat.exe -DestinationPath ops-cat-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: release-ops-cat-${{ matrix.platform }}
          path: ops-cat-${{ matrix.platform }}.*

  build-opsctl:
    name: opsctl (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o opsctl${{ matrix.ext }} ./cmd/opsctl/

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: tar -czf opsctl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz opsctl

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        run: zip opsctl-${{ matrix.goos }}-${{ matrix.goarch }}.zip opsctl.exe

      - uses: actions/upload-artifact@v4
        with:
          name: release-opsctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: opsctl-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Create Release
    needs: [build-desktop, build-opsctl]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
