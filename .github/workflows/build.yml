name: Build

on:
  push:
    branches:
      - main
      - "release/*"
      - "feat/*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: ${{ github.sha }}

jobs:
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform: darwin-arm64
            artifact_path: build/bin/ops-cat.app
          - os: macos-13
            goos: darwin
            goarch: amd64
            platform: darwin-amd64
            artifact_path: build/bin/ops-cat.app
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux-amd64
            artifact_path: build/bin/ops-cat
          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows-amd64
            artifact_path: build/bin/ops-cat.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build embedded opsctl
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o ./internal/embedded/opsctl_bin ./cmd/opsctl/

      - name: Build desktop app
        run: wails build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -tags embed_opsctl

      - uses: actions/upload-artifact@v4
        with:
          name: ops-cat-${{ matrix.platform }}
          path: ${{ matrix.artifact_path }}

  build-opsctl:
    name: opsctl (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w -X github.com/cago-frame/cago/configs.Version=${{ env.VERSION }}" -o opsctl${{ matrix.ext }} ./cmd/opsctl/

      - uses: actions/upload-artifact@v4
        with:
          name: opsctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: opsctl${{ matrix.ext }}
